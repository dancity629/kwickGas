<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Gas - KWICK GAS</title>
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #2c3e50;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            margin: 20px auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: var(--dark);
            text-align: center;
            margin-top: 0;
        }

        .price-banner {
            background: var(--dark);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .price-banner span {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #444;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        #transactionArea {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed #ccc;
            margin-top: 10px;
            display: none;
        }

        .total-box {
            background: #e8f8f0;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 5px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-box strong {
            font-size: 1.4rem;
            color: var(--dark);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .btn-submit:hover {
            background: #27ae60;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #666;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>New Gas Booking</h2>

        <div class="price-banner">
            Current Rate: <span id="rateDisplay">₦0</span> / kg
        </div>

        <form id="bookingForm">
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Cylinder Size (kg)</label>
                    <input type="number" id="cylinderSize" placeholder="e.g. 12.5" step="0.1" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Refill Quantity (kg)</label>
                    <input type="number" id="quantity" placeholder="Qty to buy" step="0.1" required>
                    <div id="qtyError" class="error-msg">Quantity cannot exceed cylinder size!</div>
                </div>
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="deliveryAddress" rows="2" placeholder="Enter full delivery address" required></textarea>
            </div>

            <div class="form-group">
                <label>Delivery Slot</label>
                <select id="slot" required>
                    <option value="Morning">Morning (8 AM - 12 PM)</option>
                    <option value="Afternoon">Afternoon (12 PM - 4 PM)</option>
                    <option value="Evening">Evening (4 PM - 8 PM)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <select id="paymentMethod" required onchange="toggleTransactionField()">
                    <option value="Pay on Delivery">Pay on Delivery</option>
                    <option value="Transfer">Bank Transfer</option>
                    <option value="Card">Credit/Debit Card</option>
                </select>
            </div>

            <div id="transactionArea" class="form-group">
                <label id="refLabel">Transaction Reference</label>
                <input type="text" id="transactionRef" placeholder="Enter Reference Number">
            </div>

            <div class="total-box">
                <span>Total Amount:</span>
                <strong id="totalPriceDisplay">₦0.00</strong>
            </div>

            <button type="submit" class="btn-submit">Confirm Booking</button>
        </form>

        <a href="dashboard.html" class="back-link">← Return to Dashboard</a>
    </div>

    <script>
        // 1. Auth & Data Initialization
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) window.location.href = 'login.html';

        const gasPrice = parseFloat(localStorage.getItem('gasPricing')) || 1200;
        document.getElementById('rateDisplay').innerText = `₦${gasPrice}`;

        const qtyInput = document.getElementById('quantity');
        const cylinderInput = document.getElementById('cylinderSize');
        const qtyError = document.getElementById('qtyError');
        const totalDisplay = document.getElementById('totalPriceDisplay');

        // 2. Dynamic Price & Validation Logic
        function updatePricing() {
            const qty = parseFloat(qtyInput.value) || 0;
            const cylinder = parseFloat(cylinderInput.value) || 0;

            // Validation: Quantity vs Cylinder Size
            if (qty > cylinder && cylinder > 0) {
                qtyError.style.display = 'block';
                qtyInput.style.borderColor = 'var(--error)';
            } else {
                qtyError.style.display = 'none';
                qtyInput.style.borderColor = '#ddd';
            }

            const total = (qty * gasPrice).toFixed(2);
            totalDisplay.innerText = `₦${total}`;
        }

        qtyInput.addEventListener('input', updatePricing);
        cylinderInput.addEventListener('input', updatePricing);

        // 3. UI Toggle for Payment Methods
        function toggleTransactionField() {
            const method = document.getElementById('paymentMethod').value;
            const area = document.getElementById('transactionArea');
            const refInput = document.getElementById('transactionRef');

            if (method === 'Transfer' || method === 'Card') {
                area.style.display = 'block';
                refInput.setAttribute('required', 'true');
                document.getElementById('refLabel').innerText = `${method} Reference Number`;
            } else {
                area.style.display = 'none';
                refInput.removeAttribute('required');
            }
        }

        // 4. Form Submission & Storage
        document.getElementById('bookingForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const qty = parseFloat(qtyInput.value);
            const cylinder = parseFloat(cylinderInput.value);

            // Final Validation Check
            if (qty > cylinder) {
                alert("Error: Refill quantity cannot be more than your cylinder capacity.");
                return;
            }

            const orders = JSON.parse(localStorage.getItem('orders')) || [];

            const newOrder = {
                id: 'ORD-' + Math.floor(Math.random() * 1000000),
                userId: currentUser.id,
                cylinder_size: cylinder,
                quantity: qty,
                price_per_kg: gasPrice,
                total_price: (qty * gasPrice).toFixed(2),
                delivery_address: document.getElementById('deliveryAddress').value,
                delivery_slot: document.getElementById('slot').value,
                payment_method: document.getElementById('paymentMethod').value,
                transaction_ref: document.getElementById('transactionRef').value || 'N/A',
                payment_status: (document.getElementById('paymentMethod').value === 'Pay on Delivery') ?
                    "pending" : "paid",
                delivery_status: "pending",
                order_date: new Date().toISOString()
            };

            orders.push(newOrder);
            localStorage.setItem('orders', JSON.stringify(orders));

            alert("Success! Your booking has been placed.");
            window.location.href = 'dashboard.html';
        });
    </script>

</body>

</html>
